function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = NICKS.filter(n => {
    const tagMatch = activeTag === 'Tất cả' || n.g.includes(activeTag);
    const qMatch = !q || n.t.toLowerCase().includes(q) || n.g.toLowerCase().includes(q);
    return tagMatch && qMatch;
  });
  document.getElementById('countLabel').textContent = `${filtered.length} nick`;
  document.getElementById('nickGrid').innerHTML = filtered.length
    ? filtered.map(n => `
        <div class="nick-card" onclick="copyNickCard(this)">
          <div class="nick-copy-hint">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </div>
          <div class="nick-text">${n.t}</div>
          <div class="nick-tag">${n.g}</div>
        </div>`).join('')
    : '<p style="color:var(--g3);padding:20px 0;font-size:14px;">Không tìm thấy nick phù hợp.</p>';
}

function buildFilters() {
  document.getElementById('filterBar').innerHTML = TAGS.map(t =>
    `<button class="filter-btn${t===activeTag?' on':''}" onclick="setTag('${t}')">${t}</button>`
  ).join('');
}

function setTag(t) { activeTag = t; buildFilters(); render(); }

function copyNickCard(el) {
  const text = el.querySelector('.nick-text').innerText;
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 900);
    showToast('✓ Đã sao chép nick!');
  });
}

document.addEventListener('DOMContentLoaded', () => { buildFilters(); render(); });
